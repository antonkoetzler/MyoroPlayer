<!DOCTYPE html>

<html>

<head>
 <link rel="stylesheet" href="index.css">
 <script src="js/index.js"></script>
</head>

<body>
  <!-- Taskbar -->
  <header>
    <!-- Div box with taskbar button and dropdown menu -->
    <div>
      <button class="taskbarButton" onclick="toggleDropdown('file')">File</button>
      <ul id="file">
        <button class="taskbarButton dropdownButton" style="border-left: none; border-top: 2px solid #7393B3;" onclick="addPlaylist()">Add Playlist ~ Ctrl + N</button>
        <button class="taskbarButton dropdownButton" style="border-left: none; border-bottom: 2px solid #7393B3;" onclick="quit()">Quit&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;~ Ctrl + Q</button>
      </ul>
    </div>

    <spacer type="vertical"></spacer>

    <div>
      <button class="taskbarButton" onclick="toggleDropdown('view')">View</button>
      <ul id="view" style="left: 50px;">
        <button class="taskbarButton dropdownButton" style="border-top: 2px solid #7393B3;" onclick="toggleSidebar()">Show Sidebar&nbsp;&nbsp;~ Alt + S</button>
        <button class="taskbarButton dropdownButton" style="border-bottom: 2px solid #7393B3;" onclick="toggleControls()">Show Controls ~ Alt + C</button>
    </div>
  </header>

  <!-- Sidebar to hold playlists -->
  <aside id="sidebar">
  </aside>

  <!-- Holds: song list, music controls -->
  <main id="main">
    <ul id="songlist">
    </ul>
    <div id="controls">
      <!-- Box for song slider, play, pause, previous, next, and shuffle -->
      <section id="songControl">
        <input type="range" min="0" max="100" value="50" class="slider">
        <!-- Box for: play/pause, next, previous, and shuffle buttons -->
        <div>
          <img src="img/shuffle.png" id="shuffle" onmouseover="songControlButtonHover('shuffle')" onmouseout="songControlButtonNotHovered('shuffle')">
          <img src="img/previous.png" id="previous" onmouseover="songControlButtonHover('previous')" onmouseout="songControlButtonNotHovered('previous')">
          <img src="img/play.png" id="play" onmouseover="songControlButtonHover('play')" onmouseout="songControlButtonNotHovered('play')" onclick="togglePlay()">
          <img src="img/next.png" id="next" onmouseover="songControlButtonHover('next')" onmouseout="songControlButtonNotHovered('next')">
        </div>
      </section>

      <!-- Volume slider -->
      <section id="volumeControl">
        <input type="range" min="0" max="100" value="50" class="slider" id="volumeSlider">
      </section>
    </div>
  </main>

  <!-- Context menu (right click menu) -->
  <div id="contextMenu">
    <button class="taskbarButton contextMenuButton">Add to Queue</button>
    <button class="taskbarButton contextMenuButton">Add to Playlist</button>
  </div>

  <!-- Error message -->
  <p id="errorMessage">Error</p>

  <!-- Plays music -->
  <audio id="player" src=""></audio>
</body>

</html>
