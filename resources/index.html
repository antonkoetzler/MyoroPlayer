<!DOCTYPE html>

<html>

<head>
  <link rel="stylesheet" href="index.css">
  <script src="js/neutralino.js"></script>
  <script src="js/index.js"></script>
</head>

<body>
  <!-- Taskbar -->
  <header>
    <!-- Div box for the button and dropdown menu -->
    <div>
      <!-- Button -->
      <button class="taskbarButton" onclick="toggleDropdown('file')">File</button>

      <!-- Div box -->
      <ul style="border-left: none;" id="file">
        <button class="taskbarButton taskbarDropdownButton">New Playlist ~ Ctrl + N</button>
        <button class="taskbarButton taskbarDropdownButton">Quit&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;~ Ctrl + Q</button>
      </ul>
    </div>

    <spacer type="vertical"></spacer>

    <div>
      <button class="taskbarButton" onclick="toggleDropdown('view')">View</button>
      <ul id="view" style="left: 50px;">
        <button class="taskbarButton taskbarDropdownButton" onclick="toggleSidebar()">Enable Sidebar ~ Alt + S</button>
      </ul>
    </div>
  </header>

  <!-- Sidebar for listing playlists -->
  <aside id="sidebar">
    <button class="taskbarButton sidebarButton" onclick="toggleDirectoryPopup()">Add Playlist</button>
  </aside>

  <!-- Song list -->
  <main id="songlist">
  </main>

  <!-- Directory popup to add a new playlist -->
  <div id="directoryPopup">
    <p id="directoryPopupErrorMessage"></p>
    <input id="directoryPopupInput" type="text" placeholder="i.e. C:/Users/ or /home/flqn/" onkeydown="addPlaylistEnterActivation()">
    <button onclick="addPlaylist()">Add</button>
  </div>

  <!-- Music player -->
  <audio id="player" src="" controls></audio>
</body>

</html>
